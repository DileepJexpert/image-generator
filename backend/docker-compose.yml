# Katixo Studio — local studio stack.
#
# This file lives in backend/ for one-click "up" from IntelliJ, but it
# orchestrates the whole monorepo: build contexts are relative to this
# directory (backend is ".", the others are "../media/*" and "../frontend").
#
# Services: postgres, redis, comfyui (GPU), rembg (CPU), esrgan (GPU),
# tts (CPU/Piper), whisper (CPU/faster-whisper), ollama (CPU/Copilot LLM),
# backend (Spring Boot monolith), frontend (Flutter Web).
#
# comfyui + esrgan require the host to have nvidia-container-toolkit. On a
# machine without an NVIDIA GPU, bring up the always-runnable subset:
#   docker compose up postgres redis rembg tts whisper ollama backend frontend

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: katixo
      POSTGRES_USER: katixo
      POSTGRES_PASSWORD: katixo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U katixo -d katixo"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  comfyui:
    build:
      context: ../media/comfyui
    ports:
      - "8188:8188"
    environment:
      # ComfyUI launch flags. --lowvram keeps SDXL within an 8GB card (RTX 4060)
      # by offloading aggressively; drop it for more speed on bigger GPUs.
      COMFY_ARGS: "--lowvram"
    volumes:
      # Host bind mounts so you can drop checkpoints in a visible folder and see
      # outputs (see media/comfyui/README.md). Paths are relative to this file
      # (backend/), i.e. the repo's media/comfyui/ directory.
      - ../media/comfyui/models:/opt/ComfyUI/models
      - ../media/comfyui/output:/opt/ComfyUI/output
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: ["gpu"]

  rembg:
    build:
      context: ../media/rembg
    ports:
      - "7000:7000"
    volumes:
      # Persist the downloaded u2net model across restarts.
      - rembg_models:/root/.u2net

  esrgan:
    build:
      context: ../media/esrgan
    ports:
      - "7001:7001"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: ["gpu"]

  # Piper text-to-speech sidecar (VISION.md Phase 2). CPU-only — part of the
  # always-runnable subset. Bundles one en_US voice in the image.
  tts:
    build:
      context: ../media/tts
    ports:
      - "7002:7002"

  # faster-whisper speech-to-text sidecar (VISION.md Phase 2). CPU-only — part of
  # the always-runnable subset. Bakes the `base` model into the image.
  whisper:
    build:
      context: ../media/whisper
    ports:
      - "7003:7003"

  # Local LLM for the Copilot (VISION.md Phase 3). Runs CPU-only by default so
  # it's part of the always-runnable subset (works on a laptop without an NVIDIA
  # GPU). For GPU acceleration on the workstation, add a deploy.resources.
  # reservations.devices block like comfyui/esrgan above.
  # Pull a model once the stack is up, e.g.:
  #   docker compose exec ollama ollama pull llama3.2
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      # Persist pulled models (they are large) across restarts.
      - ollama_models:/root/.ollama

  backend:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      comfyui:
        condition: service_started
      rembg:
        condition: service_started
      esrgan:
        condition: service_started
      tts:
        condition: service_started
      whisper:
        condition: service_started
      ollama:
        condition: service_started
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/katixo
      DATABASE_USER: katixo
      DATABASE_PASSWORD: katixo
      REDIS_URL: redis://redis:6379
      ASSET_STORAGE_PATH: /data/assets
      # Sidecar URLs — wired up in Milestone 2.
      COMFYUI_URL: http://comfyui:8188
      REMBG_URL: http://rembg:7000
      ESRGAN_URL: http://esrgan:7001
      TTS_URL: http://tts:7002
      WHISPER_URL: http://whisper:7003
      # Copilot LLM (VISION.md Phase 3).
      OLLAMA_URL: http://ollama:11434
      COPILOT_MODEL: llama3.2
    ports:
      - "8585:8585"
    volumes:
      - asset_data:/data/assets
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8585/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    build:
      context: ../frontend
    depends_on:
      - backend
    ports:
      - "8081:80"

volumes:
  postgres_data:
  asset_data:
  rembg_models:
  ollama_models:
