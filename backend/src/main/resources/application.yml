spring:
  application:
    name: katixo-studio
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/katixo}
    username: ${DATABASE_USER:katixo}
    password: ${DATABASE_PASSWORD:katixo}
  jpa:
    hibernate:
      # Schema is owned by Flyway. Never let Hibernate touch DDL.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
          lob:
            non_contextual_creation: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

server:
  port: ${SERVER_PORT:8585}
  error:
    include-stacktrace: never   # never leak a stacktrace to the caller
    include-message: always

logging:
  level:
    com.katixo: INFO

# ---------------------------------------------------------------------------
# Katixo monolith config. Studio sidecars under katixo.*; doc-AI under katixo.ai.*.
# ---------------------------------------------------------------------------
katixo:
  comfyui-url: ${COMFYUI_URL:http://localhost:8188}
  rembg-url: ${REMBG_URL:http://localhost:7000}
  esrgan-url: ${ESRGAN_URL:http://localhost:7001}
  tts-url: ${TTS_URL:http://localhost:7002}
  whisper-url: ${WHISPER_URL:http://localhost:7003}
  ollama-url: ${OLLAMA_URL:http://localhost:11434}
  copilot-model: ${COPILOT_MODEL:qwen3}
  asset-storage-path: ${ASSET_STORAGE_PATH:/data/assets}

  # Copilot web_search tool. Optional SearXNG for richer results; blank = scrape DuckDuckGo (no key).
  search:
    searxng-url: ${SEARXNG_URL:}
  # Copilot git_push tool (approval-gated). Absolute path of a git repo the agent may commit + push;
  # blank = disabled.
  git:
    repo-dir: ${GIT_REPO_DIR:}

  ai:
    # Single-GPU guard. One process now, so an in-process lock is enough — no Postgres advisory lock.
    gpu:
      lock-mode: ${GPU_LOCK_MODE:in-process}
      acquire-timeout: 120s
      poll-interval: 250ms
      max-hold: 15m
    # Doc-AI: invoice / GRN / bill extraction + reconciliation. All inference is LOCAL (Ollama + OCR).
    privacy:
      # Refuse to start if any AI endpoint is not localhost — the offline guarantee.
      enforce-localhost: true
    ollama:
      base-url: ${OLLAMA_URL:http://localhost:11434}
      text-model: ${OLLAMA_TEXT_MODEL:qwen2.5:7b-instruct}
      vision-model: ${OLLAMA_VISION_MODEL:minicpm-v}
      temperature: 0.0
      seed: 42
      keep-alive: 5m
      timeout-seconds: 120
      format: json
    ocr:
      base-url: ${OCR_URL:http://localhost:8000}
      threshold: 0.75
      timeout-seconds: 60
    preprocess:
      pdf-dpi: 300
      max-edge-px: 2200
      deskew-max-angle-deg: 10.0
    review:
      threshold: 0.80
    prompts:
      version: v1
    eval:
      golden-dir: eval/golden

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
