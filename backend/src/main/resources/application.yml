spring:
  application:
    name: katixo-studio
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/katixo}
    username: ${DATABASE_USER:katixo}
    password: ${DATABASE_PASSWORD:katixo}
  jpa:
    hibernate:
      # Schema is owned by Flyway. Never let Hibernate touch DDL.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

# Internal sidecar URLs (used from Milestone 2 onward).
katixo:
  comfyui-url: ${COMFYUI_URL:http://localhost:8188}
  rembg-url: ${REMBG_URL:http://localhost:7000}
  esrgan-url: ${ESRGAN_URL:http://localhost:7001}
  # Text-to-speech sidecar (Piper) for voiceover generation.
  tts-url: ${TTS_URL:http://localhost:7002}
  # Speech-to-text sidecar (faster-whisper) for transcription / captions.
  whisper-url: ${WHISPER_URL:http://localhost:7003}
  # Local LLM (Ollama) powering the Copilot. copilot-model is the default model
  # used when a request doesn't name one; it must be pulled into Ollama. Default
  # is qwen3 (8B): a tool-capable, free model that fits a 12GB GPU and drives the
  # agent loop far more reliably than smaller models (e.g. llama3.2 3B).
  ollama-url: ${OLLAMA_URL:http://localhost:11434}
  copilot-model: ${COPILOT_MODEL:qwen3}
  asset-storage-path: ${ASSET_STORAGE_PATH:/data/assets}
  # Shared single-GPU guard (see katixo-ai-platform). Serializes GPU work across this app AND
  # katixo-docai so the one RTX 4060 is never used by both at once. Both apps MUST use lock-mode=
  # postgres and the SAME lock-datasource (the shared "lock authority" DB) or nothing is serialized.
  ai:
    gpu:
      lock-mode: ${GPU_LOCK_MODE:postgres}
      acquire-timeout: 120s
      poll-interval: 250ms
      max-hold: 15m
      lock-datasource:
        url: ${GPU_LOCK_DB_URL:jdbc:postgresql://localhost:5432/katixo_gpu}
        username: ${GPU_LOCK_DB_USER:katixo}
        password: ${GPU_LOCK_DB_PASSWORD:katixo}

server:
  # Unique port to avoid clashing with other local Spring Boot apps (8080).
  # Override with SERVER_PORT if needed.
  port: ${SERVER_PORT:8585}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
